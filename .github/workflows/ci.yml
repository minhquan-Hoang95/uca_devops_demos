name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: black – format check
        run: black --check scripts/ tests/

      - name: flake8 – style check
        run: flake8 scripts/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  validate-opl:
    name: Validate OPL files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check OPL file inventory
        run: |
          echo "=== .mod files ==="
          find opl/ -name "*.mod" | sort || echo "(none yet)"
          echo "=== .dat files ==="
          find opl/ -name "*.dat" | sort || echo "(none yet)"

      - name: Verify OPL syntax markers
        # Full validation requires IBM CPLEX (not available on hosted runners).
        # This step checks that every .mod file contains at least a 'minimize'
        # or 'maximize' keyword and that every .dat file references a known model.
        # Replace / extend this step when a self-hosted runner with CPLEX is available.
        run: |
          FAILED=0
          for mod in $(find opl/ -name "*.mod"); do
            if ! grep -qE "minimize|maximize" "$mod"; then
              echo "WARNING: $mod has no objective function keyword"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "OPL model validation warnings found."
            exit 1
          fi
          echo "All OPL models passed basic validation (or no models present)."
        continue-on-error: true   # remove once models are stable
