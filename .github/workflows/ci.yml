name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - run: black --check scripts/ tests/
      - run: flake8 scripts/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - run: pytest

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - name: bandit – Python security linter
        run: bandit -r scripts/ -ll

      - name: pip-audit – CVE scan
        run: pip-audit

  validate-opl:
    name: Validate OPL files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check .mod files have an objective function
        run: |
          mods=$(find opl/ -name "*.mod")
          [ -z "$mods" ] && echo "No .mod files yet." && exit 0
          failed=0
          for f in $mods; do
            grep -qE "minimize|maximize" "$f" || { echo "WARN: $f missing objective"; failed=1; }
          done
          exit $failed
        continue-on-error: true   # remove once OPL models are stable
