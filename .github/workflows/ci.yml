name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - run: black --check scripts/ tests/
      - run: flake8 scripts/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          [ -f requirements.txt ] && pip install -r requirements.txt || true

      - run: pytest

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  validate-opl:
    name: Validate OPL files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .mod files have an objective function
        run: |
          mods=$(find opl/ -name "*.mod")
          [ -z "$mods" ] && echo "No .mod files yet." && exit 0
          failed=0
          for f in $mods; do
            grep -qE "minimize|maximize" "$f" || { echo "WARN: $f missing objective"; failed=1; }
          done
          exit $failed
        continue-on-error: true   # remove once OPL models are stable
